version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: deploy/Dockerfile.api
    container_name: tgbot_api
    restart: always
    env_file:
      - .env
    volumes:
      # Прокидаємо папку з базою даних, щоб вона не видалялася при перезапуску контейнера
      - ./api/data:/app/data
    expose:
      - "8000"

  frontend:
    build:
      context: .
      dockerfile: deploy/Dockerfile.frontend
    container_name: tgbot_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - api

  # Заготовка для Гліба. Поки він не напише бота, цей сервіс закоментований.
